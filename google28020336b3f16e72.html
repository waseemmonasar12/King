<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script src="https://cdn.counter.dev/script.js" data-id="3c450f06-3ecb-4e02-8ccd-23c8958b0170" data-utcoffset="2"></script> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية أبو محمد العبيدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --navy: #0f172a; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; margin: 0; color: var(--navy); }
        header { background: var(--navy); color: white; padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .visitor-badge { margin-top: 15px; display: inline-block; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        
        /* تنسيق أقسام الدورات */
        .course-section { margin-bottom: 50px; }
        .course-title { 
            background: var(--navy); color: var(--gold); 
            padding: 15px 25px; border-radius: 10px; 
            margin-bottom: 20px; display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { 
            background: white; border-radius: 15px; padding: 25px; text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--gold);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .btn { 
            display: inline-block; background: var(--gold); color: var(--navy); 
            text-decoration: none; padding: 10px 20px; border-radius: 8px; 
            margin-top: 15px; font-weight: bold; width: 100%; box-sizing: border-box;
        }
        .status { text-align: center; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <span style="font-size: 50px;">⚜️</span>
    <h1>منصة  أبو محمد العبيدي</h1>
    <p>جميع الدورات التدريبية والحقائب التعليمية</p>
    <div class="visitor-badge">
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fgithub.com%2Fwaseemmonasar12%2FFor-whatsapp-&count_bg=%23C5A059&title_bg=%23555555&title=الزيارات" alt="الزوار"/>
    </div>
</header>

<div class="container" id="mainContainer">
    <div class="status" id="loadStatus">جاري جلب الدورات والكتب...</div>
</div>

<script>
    const USER = "waseemmonasar12";
    const REPO = "For-whatsapp-";
    const MAIN_FOLDER = "courses"; // المجلد الرئيسي الذي يحتوي المجلدات الفرعية

    async function loadLibrary() {
        const container = document.getElementById('mainContainer');
        const status = document.getElementById('loadStatus');

        try {
            // 1. جلب المجلدات داخل courses
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${MAIN_FOLDER}`);
            const folders = await res.json();

            if (!Array.isArray(folders)) {
                status.innerHTML = "⚠️ يرجى إنشاء مجلد باسم <b>courses</b> في GitHub";
                return;
            }

            container.innerHTML = ''; // مسح رسالة التحميل

            // 2. الدوران على كل مجلد (دورة)
            for (const folder of folders) {
                if (folder.type === 'dir') {
                    const section = document.createElement('section');
                    section.className = 'course-section';
                    section.innerHTML = `<h2 class="course-title">📂 دورة: ${folder.name}</h2><div class="books-grid" id="grid-${folder.sha}"></div>`;
                    container.appendChild(section);

                    // 3. جلب الملفات داخل كل مجلد
                    const fileRes = await fetch(folder.url);
                    const files = await fileRes.json();
                    const grid = document.getElementById(`grid-${folder.sha}`);

                    const pdfs = files.filter(f => f.name.endsWith('.pdf'));
                    
                    if (pdfs.length === 0) {
                        grid.innerHTML = "<p>لا توجد ملفات في هذه الدورة بعد.</p>";
                    } else {
                        pdfs.forEach(pdf => {
                            const bookName = pdf.name.replace('.pdf', '').replace(/[-_]/g, ' ');
                            grid.innerHTML += `
                                <div class="card">
                                    <span style="font-size:40px;">📕</span>
                                    <h3>${bookName}</h3>
                                    <a href="${pdf.download_url}" class="btn" target="_blank">فتح الكتاب</a>
                                </div>
                            `;
                        });
                    }
                }
            }
        } catch (e) {
            status.innerHTML = "❌ خطأ: تأكد من تسمية المجلدات بشكل صحيح.";
        }
    }

    window.onload = loadLibrary;
</script>

</body>
</html>
