<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ملك البرمجيات | King Shop</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #ffc107; --dark: #121212; --card: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        /* لوحة التحكم */
        .admin-panel { background: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--primary); }
        input, select, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: var(--primary); cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.8; }

        /* عرض المنتجات */
        .country-card { background: var(--card); margin: 15px 0; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .country-header { display: flex; justify-content: space-between; align-items: center; color: var(--primary); font-size: 1.2rem; font-weight: bold; }
        .product-item { display: flex; justify-content: space-between; background: #252525; margin: 5px 0; padding: 10px; border-radius: 5px; }
        .price { color: #4caf50; font-weight: bold; }
        
        .status-online { color: #4caf50; font-size: 0.8rem; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 متجر ملك البرمجيات</h1>
    <div id="connectionStatus" class="status-online">جاري الاتصال بالسحابة...</div>

    <div class="admin-panel" id="adminPanel">
        <h3>🛠 لوحة التحكم (للمالك فقط)</h3>
        <input type="text" id="countryName" placeholder="اسم الدولة (مثلاً: بولندا)">
        <input type="text" id="serviceName" placeholder="الخدمة (مثلاً: واتساب)">
        <input type="number" id="price" placeholder="السعر">
        <button onclick="addData()">إضافة/تحديث المنتج</button>
        <p style="font-size: 0.8rem; color: #bbb;">* ملاحظة: أي تعديل هنا يظهر فوراً عند جميع الزبائن.</p>
    </div>

    <div id="shopContent"></div>
</div>

<script>
    // 1. إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyAfnw3xes2mWLwW7efGS3qze4a-S9z6elo",
        authDomain: "king-ffd5b.firebaseapp.com",
        projectId: "king-ffd5b",
        storageBucket: "king-ffd5b.firebasestorage.app",
        messagingSenderId: "279124509483",
        appId: "1:279124509483:web:f7679b3a5128c77c52bb6e",
        measurementId: "G-4GP1XV60VD",
        databaseURL: "https://king-ffd5b-default-rtdb.firebaseio.com" // رابط القاعدة
    };

    // 2. تشغيل Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 3. جلب البيانات وعرضها (تحديث تلقائي)
    db.ref('products').on('value', (snapshot) => {
        document.getElementById('connectionStatus').innerText = "● متصل بالسحابة (تحديث فوري)";
        const data = snapshot.val();
        renderShop(data);
    });

    // 4. وظيفة إضافة البيانات للسحابة
    function addData() {
        const country = document.getElementById('countryName').value;
        const service = document.getElementById('serviceName').value;
        const price = document.getElementById('price').value;

        if(country && service && price) {
            // حفظ البيانات في مسار: products/اسم_الدولة/اسم_الخدمة
            db.ref('products/' + country + '/' + service).set({
                price: price + " RY"
            }).then(() => {
                alert("تم التحديث بنجاح!");
                document.getElementById('serviceName').value = "";
                document.getElementById('price').value = "";
            });
        } else {
            alert("يرجى ملء جميع الحقول");
        }
    }

    // 5. رسم واجهة المتجر
    function renderShop(data) {
        const container = document.getElementById('shopContent');
        container.innerHTML = "";

        if (!data) {
            container.innerHTML = "<p style='text-align:center;'>المتجر فارغ حالياً...</p>";
            return;
        }

        for (let country in data) {
            let countryHtml = `
                <div class="country-card">
                    <div class="country-header">
                        <span>📍 ${country}</span>
                        <button onclick="deleteCountry('${country}')" style="background:red; font-size:10px;">حذف</button>
                    </div>
            `;
            
            for (let service in data[country]) {
                countryHtml += `
                    <div class="product-item">
                        <span>${service}</span>
                        <span class="price">${data[country][service].price}</span>
                    </div>
                `;
            }
            
            countryHtml += `</div>`;
            container.innerHTML += countryHtml;
        }
    }

    // وظيفة حذف دولة كاملة
    function deleteCountry(name) {
        if(confirm("هل تريد حذف " + name + " نهائياً؟")) {
            db.ref('products/' + name).remove();
        }
    }
</script>

</body>
</html>
